<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOOP Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .player-card { background: #181818; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn { background: #1DB954; color: black; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .track-list { margin-top: 20px; text-align: left; }
    </style>
</head>
<body>
    <div class="player-card">
        <h2>LOOP Music</h2>
        <p id="status">Загрузка плеера...</p>
        <button class="btn" onclick="showAlert()">Привет, Telegram!</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран
        document.getElementById('status').innerText = "Привет, " + tg.initDataUnsafe.user.first_name;

        function showAlert() {
            tg.showAlert("Это твой будущий плеер!");
        }
    </script>
</body>
</html>
