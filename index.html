<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LOOP Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .player { width: 90%; background: #111; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #333; }
        input { width: 80%; background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 10px; margin-bottom: 20px; }
        audio { width: 100%; margin-top: 20px; filter: invert(100%); }
        .btn { background: #1DB954; color: #000; padding: 12px 30px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="player">
        <h2 style="color: #1DB954;">LOOP</h2>
        <input type="text" id="trackName" placeholder="Какую песню ищем?">
        <br>
        <button class="btn" onclick="sendToBot()">НАЙТИ</button>
        
        <div id="audioContainer" style="display:none;">
            <p id="nowPlaying" style="font-size: 14px; margin-top: 15px;"></p>
            <audio id="remotePlayer" controls></audio>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function sendToBot() {
            const val = document.getElementById('trackName').value;
            tg.sendData(val); // Отправляем боту запрос и закрываем окно
        }
    </script>
</body>
</html>
