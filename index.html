<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOOP Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --sp-green: #1DB954; --sp-black: #121212; --sp-grey: #282828; }
        body { background-color: var(--sp-black); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .search-box { width: 100%; background: var(--sp-grey); border: none; padding: 12px; border-radius: 5px; color: white; margin-bottom: 20px; }
        .track-card { display: flex; align-items: center; background: #181818; padding: 10px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; }
        .track-card:hover { background: #282828; }
        .track-info { margin-left: 15px; }
        .track-title { font-weight: bold; font-size: 14px; }
        .track-artist { color: #b3b3b3; font-size: 12px; }
        #player-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; border-top: 1px solid #282828; padding: 15px; display: none; }
        audio { width: 90%; filter: invert(1); }
    </style>
</head>
<body>

    <h2>Поиск</h2>
    <input type="text" id="searchInput" class="search-box" placeholder="Что хочешь послушать?">
    <button onclick="search()" style="background: var(--sp-green); border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold;">Найти</button>

    <div id="results-list" style="margin-top: 20px;">
        </div>

    <div id="player-bar">
        <div id="current-title" style="font-size: 12px; margin-bottom: 5px;"></div>
        <audio id="audioPlayer" controls autoplay></audio>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

async function search() {
    const query = document.getElementById('searchInput').value;
    const resultsDiv = document.getElementById('results-list');
    
    // ЗАМЕНИ ЭТУ ССЫЛКУ НА СВОЮ ИЗ NGROK
    const serverUrl = "https://milkless-rachel-brandless.ngrok-free.dev";

    resultsDiv.innerHTML = "Ищу...";
    
    try {
        const response = await fetch(`${serverUrl}/search?query=${query}`);
        const data = await response.json();
        
        if (data.url) {
            resultsDiv.innerHTML = `
                <div class="track-card" onclick="playTrack('${data.url}', '${data.title}')">
                    <img src="${data.thumbnail}" width="50" style="border-radius: 4px;">
                    <div class="track-info">
                        <div class="track-title">${data.title}</div>
                        <div class="track-artist">YouTube Stream</div>
                    </div>
                </div>
            `;
        } else {
            resultsDiv.innerHTML = "Ничего не найдено.";
        }
    } catch (e) {
        resultsDiv.innerHTML = "Ошибка связи с сервером.";
    }
}

        function playTrack(url, title) {
            const playerBar = document.getElementById('player-bar');
            const audio = document.getElementById('audioPlayer');
            document.getElementById('current-title').innerText = title;
            
            playerBar.style.display = 'block';
            audio.src = url;
            audio.play();
        }
    </script>
</body>
</html>
